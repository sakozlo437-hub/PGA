name: Pinterest Growth Agent CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 8 AM UTC (adjust as needed)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate environment variables
        run: |
          echo "Checking required environment variables..."
          required_vars=("PINTEREST_EMAIL" "PINTEREST_PASSWORD" "GROQ_API_KEY" "BASEROW_TOKEN" "BASEROW_DATABASE_ID")
          missing=()
          
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required environment variables: ${missing[*]}"
            exit 1
          fi
          
          echo "All required environment variables are set."
        env:
          PINTEREST_EMAIL: ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
          BASEROW_DATABASE_ID: ${{ secrets.BASEROW_DATABASE_ID }}
      
      - name: Validate config.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('config.yaml'))"
          echo "config.yaml is valid YAML"
      
      - name: Test database connection
        run: |
          python -c "
          import os
          import httpx
          
          baserow_token = os.environ.get('BASEROW_TOKEN')
          baserow_db_id = os.environ.get('BASEROW_DATABASE_ID')
          
          if not baserow_token or not baserow_db_id:
              print('Baserow credentials not provided, skipping connection test')
              exit(0)
          
          try:
              response = httpx.get(
                  f'https://api.baserow.io/api/database/tables/',
                  headers={'Authorization': f'Token {baserow_token}'},
                  timeout=10
              )
              if response.status_code == 200:
                  print('✓ Baserow connection successful')
              else:
                  print(f'✗ Baserow connection failed: {response.status_code}')
                  print(response.text)
                  exit(1)
          except Exception as e:
              print(f'✗ Baserow connection error: {e}')
              exit(1)
          "
        env:
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
          BASEROW_DATABASE_ID: ${{ secrets.BASEROW_DATABASE_ID }}

  run-agent:
    name: Run Pinterest Growth Agent
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Create data directory
        run: mkdir -p data assets
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          PINTEREST_EMAIL=${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD=${{ secrets.PINTEREST_PASSWORD }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          BASEROW_URL=https://api.baserow.io
          BASEROW_TOKEN=${{ secrets.BASEROW_TOKEN }}
          BASEROW_DATABASE_ID=${{ secrets.BASEROW_DATABASE_ID }}
          EOF
          echo ".env file created successfully"
      
      - name: Initialize database
        run: |
          python -c "
          from src.store.database import Database
          from src.utils.config import load_config
          
          config = load_config()
          db = Database(config['paths']['database'])
          db.initialize()
          print('Database initialized successfully')
          "
      
      - name: Run agent cycle
        run: |
          python -m src.main run-now
        env:
          PINTEREST_EMAIL: ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD: ${{ secrets.PINTEREST_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BASEROW_URL: https://api.baserow.io
          BASEROW_TOKEN: ${{ secrets.BASEROW_TOKEN }}
          BASEROW_DATABASE_ID: ${{ secrets.BASEROW_DATABASE_ID }}
      
      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs
          path: |
            logs/
            data/
          retention-days: 7

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: run-agent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy via SSH (optional)
        if: ${{ secrets.SERVER_SSH_KEY != '' }}
        run: |
          echo "Deploying to server..."
          # Add your deployment script here
          # Example: rsync, scp, or custom deployment script
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
      
      - name: Notify deployment status
        run: |
          echo "Deployment completed successfully!"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
